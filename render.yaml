services:
  - type: web
    name: chatgpt-oidc-sso
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: ISSUER_URL
        sync: false
      - key: ALLOWED_EMAIL_DOMAIN
        sync: false
      - key: COOKIE_KEYS
        sync: false
      - key: OIDC_CLIENT_ID
        sync: false
      - key: OIDC_CLIENT_SECRET
        sync: false
      - key: OIDC_REDIRECT_URIS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
